<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Глубокий академический синий фон (Navy Blue) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/> <!-- Насыщенный синий -->
      <stop offset="100%" stop-color="#0F172A"/> <!-- Темный сланцевый -->
    </linearGradient>

    <!-- Премиальное золото (для обложки и звезды) -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>

    <!-- Бордовый цвет (для закладки) -->
    <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#9F1239"/>
    </linearGradient>

    <!-- Тень для придания глубины -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Мягкое свечение в центре фона, чтобы книга выделялась -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 1. Базовая форма - скругленный квадрат -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Центральное свечение -->
  <circle cx="50" cy="50" r="30" fill="#3B82F6" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Тонкая стеклянная рамка -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.15"/>

  <!-- 2. Золотая основа (Обложка книги) -->
  <path d="M 50 80 Q 33 69 15 74 V 37 Q 33 33 50 45 Q 67 33 85 37 V 74 Q 67 69 50 80 Z" 
        fill="url(#goldGrad)" filter="url(#shadow)"/>

  <!-- 3. Бордовая лента-закладка -->
  <path d="M 44 75 V 92 L 50 87 L 56 92 V 75 Z" 
        fill="url(#crimsonGrad)" filter="url(#shadow)"/>

  <!-- 4. Левая страница (Ярко-белая) -->
  <path d="M 50 77 Q 34 67 17 71 V 39 Q 34 35 50 47 Z" 
        fill="#FFFFFF"/>

  <!-- 5. Правая страница (Светло-серая для эффекта тени в центре сгиба) -->
  <path d="M 50 77 Q 66 67 83 71 V 39 Q 66 35 50 47 Z" 
        fill="#CBD5E1"/>

  <!-- 6. Золотая Звезда (Символ рейтинга и высоких баллов) -->
  <path d="M 50 9 L 52.5 15.5 L 59.5 15.5 L 54 20 L 56 27 L 50 23 L 44 27 L 46 20 L 40.5 15.5 L 47.5 15.5 Z" 
        fill="url(#goldGrad)" filter="url(#shadow)"/>
</svg>