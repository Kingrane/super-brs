<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Полнофункциональный клиент Сервиса БРС SFEDU">
    <title>SFEDU БРС</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app" class="app-shell">
        <section id="loginView" class="view view-active" aria-labelledby="loginTitle">
            <div class="auth-layout">
                <aside class="auth-aside">
                    <p class="kicker">Топ дс брс</p>
                    <h1 id="loginTitle">Сервис БРС ЮФУ</h1>
                    <p class="lead">Сильный человек это не тот кто поднимает тяжести или управляет компанией, а тот кто
                        получил 60 баллов по непре</p>
                    <a class="link-inline" target="_blank" rel="noopener noreferrer"
                        href="https://grade.sfedu.ru/sign?goal=/student/authtokenget">
                        Получить токен доступа
                    </a>
                </aside>

                <div class="auth-card" aria-live="polite">
                    <label class="field">
                        <span>Токен</span>
                        <input id="tokenInput" class="input mono" type="text" placeholder="40 символов hex"
                            maxlength="40" autocomplete="off">
                    </label>

                    <div class="auth-actions-row">
                        <label class="check">
                            <input id="rememberCheck" type="checkbox">
                            <span>Запомнить на этом устройстве</span>
                        </label>
                        <button id="btnPaste" class="btn btn-ghost" type="button">Вставить</button>
                    </div>

                    <div class="auth-buttons">
                        <button id="btnLogin" class="btn btn-primary" type="button">Войти</button>
                    </div>

                    <p id="loginStatus" class="status" role="status"></p>
                </div>
            </div>
        </section>

        <section id="dashboardView" class="view" aria-label="Панель оценок">
            <header class="topbar">
                <div>
                    <p class="kicker">БРС ЮФУ</p>
                    <h2>Мои дисциплины</h2>
                </div>
                <div class="topbar-actions">
                    <button id="btnRefresh" class="btn btn-ghost" type="button">Обновить</button>
                    <button id="btnLogout" class="btn btn-danger" type="button">Выйти</button>
                </div>
            </header>

            <section class="toolbar card">
                <label class="field field-inline">
                    <span>Семестр</span>
                    <select id="semesterSelect" class="input select">
                        <option value="">Загрузка...</option>
                    </select>
                </label>
                <div class="toolbar-actions">
                    <button id="btnRetryMain" class="btn btn-ghost" type="button" hidden>Повторить запрос</button>
                </div>
            </section>

            <main class="dashboard-grid">
                <section class="card panel-list">
                    <div class="panel-head">
                        <h3>Список дисциплин</h3>
                        <span id="discCount" class="pill">0</span>
                    </div>
                    <div id="discList" class="panel-body"></div>
                </section>

                <section class="detail-column">
                    <article class="card panel-detail">
                        <div class="panel-head">
                            <h3 id="subjectTitle">Детали дисциплины</h3>
                            <span id="subjectBadge" class="pill">-</span>
                        </div>

                        <nav class="tabs" aria-label="Вкладки дисциплины">
                            <button class="tab tab-active" data-tab="grade" type="button">Оценка</button>
                            <button class="tab" data-tab="journal" type="button">Журнал</button>
                            <button class="tab" data-tab="map" type="button">Модули</button>
                            <button class="tab" data-tab="teachers" type="button">Преподаватели</button>
                        </nav>

                        <div class="panel-body">
                            <section id="tab-grade" class="tab-panel tab-panel-active"></section>
                            <section id="tab-journal" class="tab-panel"></section>
                            <section id="tab-map" class="tab-panel"></section>
                            <section id="tab-teachers" class="tab-panel"></section>
                        </div>
                    </article>

                    <article class="card panel-profile">
                        <div class="panel-head">
                            <h3>Профиль студента</h3>
                        </div>
                        <div id="profileContent" class="panel-body"></div>
                    </article>
                </section>
            </main>

            <details class="card debug-card">
                <summary>Debug API</summary>
                <pre id="debugPre"></pre>
            </details>
        </section>
    </div>

    <template id="tplLoading">
        <div class="state state-loading">
            <div class="skeleton skeleton-lg"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </template>

    <template id="tplEmpty">
        <div class="state state-empty">
            <h4>Пока нет данных</h4>
            <p>Выберите семестр или проверьте ответ сервера.</p>
        </div>
    </template>

    <script type="module" src="app.js"></script>
</body>

</html>
